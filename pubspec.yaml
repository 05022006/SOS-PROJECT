name: sos_safety_app
description: SOS & Geo-Fencing Mobile Application for Women and Elderly Safety
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  flutter_dotenv: ^5.1.0

  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.16.0

  # Sensors
  sensors_plus: ^4.0.2
  permission_handler: ^11.1.0

  # SMS & Phone
  url_launcher: ^6.1.7
  telephony: ^0.2.0 # discontinued but still compile for Android

  # Storage (Offline-first)
  shared_preferences: ^2.5.5
  sqflite: ^2.3.0

  # Background Services
  flutter_background_service: ^5.0.5

  # Audio (for panic detection)
  record: ^6.2.0

  # UI & Utils
  cupertino_icons: ^1.0.9
  intl: ^0.20.2
  http: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
